{% load static %}
{% load crispy_forms_tags %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>GARAGE HUB</title>

  <!-- CSS -->
  <link rel="stylesheet" href="{% static 'assets/vendors/mdi/css/materialdesignicons.min.css' %}">
  <link rel="stylesheet" href="{% static 'assets/vendors/css/vendor.bundle.base.css' %}">
  <link rel="stylesheet" href="{% static 'assets/css/style.css' %}">

  <link rel="shortcut icon" href="{% static 'assets/images/favicon.png' %}" />

  <style>
    .sidebar-brand h3 {
        color: #ffffff;
        font-weight: 700;
        margin: 0;
        letter-spacing: 1px;
    }
        .logo-text {
      font-weight: 800;
      margin: 0;
      letter-spacing: 1px;
      font-size: 22px;
  }

  .garage-text {
      color: #ffffff; /* White */
  }

  .hub-text {
      color: #ff0000; /* Red */
  }
  </style>
</head>

<body>
<div class="container-scroller">

  <!-- ================= SIDEBAR ================= -->
  <nav class="sidebar sidebar-offcanvas" id="sidebar">

    <!-- LOGO -->
    <div class="sidebar-brand-wrapper d-none d-lg-flex align-items-center justify-content-center fixed-top">
      <a class="sidebar-brand brand-logo text-white" href="#">
       <h3 class="logo-text">
           <span class="garage-text">Garage</span>
           <span class="hub-text">Hub</span>
       </h3>

      </a>
    </div>

    <!-- MENU -->
    <ul class="nav">

      <li class="nav-item profile">
        <div class="profile-desc">
          <div class="profile-pic">
            <div class="count-indicator">
              <img class="img-xs rounded-circle" src="{% static 'assets/images/faces/face15.jpg' %}" alt="">
              <span class="count bg-success"></span>
            </div>
            <div class="profile-name">
              <h5 class="mb-0 font-weight-normal">{{ request.user }}</h5>
              <span>Gold Member</span>
            </div>
          </div>
        </div>
      </li>

      <!-- MENU ITEMS -->
      <li class="nav-item menu-items">
            <a class="nav-link" href="{% url 'service_lists' %}">
              <span class="menu-icon">
                <i class="mdi mdi-file-document-box"></i>
              </span>
              <span class="menu-title">SERVICE LIST</span>
            </a>
          </li>

                 <li class="nav-item menu-items">
            <a class="nav-link" href="{% url 'customers_list' %}">
              <span class="menu-icon">
                <i class="mdi mdi-file-document-box"></i>
              </span>
              <span class="menu-title">CUSTOMERS LIST</span>
            </a>
          </li>





            <li class="nav-item menu-items">
            <a class="nav-link" href="{% url 'car_views' %}">
              <span class="menu-icon">
                <i class="mdi mdi-file-document-box"></i>
              </span>
              <span class="menu-title">CAR LIST</span>
            </a>
          </li>



            <li class="nav-item menu-items">
            <a class="nav-link" href="{% url 'availability_views' %}">
              <span class="menu-icon">
                <i class="mdi mdi-file-document-box"></i>
              </span>
              <span class="menu-title">AVAILABILITY VIEWS</span>
            </a>
          </li>



            <li class="nav-item menu-items">
            <a class="nav-link" href="{% url 'view_status' %}">
              <span class="menu-icon">
                <i class="mdi mdi-file-document-box"></i>
              </span>
              <span class="menu-title">STATUS VIEW</span>
            </a>
          </li>




             <li class="nav-item menu-items">
            <a class="nav-link" href="{% url 'all_bookingss' %}">
              <span class="menu-icon">
                <i class="mdi mdi-file-document-box"></i>
              </span>
              <span class="menu-title">ALL BOOKINGS </span>
            </a>
          </li>






            <li class="nav-item menu-items">
            <a class="nav-link" href="{% url 'Log_out' %}">
              <span class="menu-icon">
                <i class="mdi mdi-file-document-box"></i>
              </span>
              <span class="menu-title">LOG OUT</span>
            </a>
          </li>
    </ul>
  </nav>

  <!-- ================= PAGE BODY ================= -->
  <div class="container-fluid page-body-wrapper">

    <!-- NAVBAR -->
    <nav class="navbar p-0 fixed-top d-flex flex-row">
      <div class="navbar-brand-wrapper d-flex d-lg-none align-items-center justify-content-center">
        <a class="navbar-brand brand-logo-mini text-white" href="#">GH</a>
      </div>
    </nav>

    <!-- MAIN CONTENT -->
    <div class="main-panel">
      <div class="content-wrapper">
        <div class="card">
          <div class="card-body">
            <h4 class="card-title">Welcome</h4>
            {% block content %}
            {% endblock %}
          </div>
        </div>
      </div>

      <!-- FOOTER -->
      <footer class="footer">
        <div class="d-sm-flex justify-content-center justify-content-sm-between">
          <span class="text-muted d-block text-center text-sm-left">
            © 2026 GarageHub
          </span>
        </div>
      </footer>

    </div>
  </div>
</div>

<!-- JS -->
<script src="{% static 'assets/vendors/js/vendor.bundle.base.js' %}"></script>
<script src="{% static 'assets/js/off-canvas.js' %}"></script>
<script src="{% static 'assets/js/misc.js' %}"></script>

</body>
</html>
